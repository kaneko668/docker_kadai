<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バイタル入力 - 医療管理システム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div style="text-align: right; margin-bottom: 15px;">
            <a href="/logout" style="color: #e74c3c; text-decoration: none; font-weight: bold; border: 1px solid #e74c3c; padding: 5px 15px; border-radius: 4px;">🚪 ログアウト</a>
        </div>

    <h1>本日のバイタル入力</h1>
    
        <form action="/submit" method="POST">
            
            <div class="form-group">
                <label>患者名を選択</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select name="patient_id" required style="flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;">
                        <option value="" disabled selected>▼ 患者さんを選んでください</option>
                        {% for patient in patients %}
                            <option value="{{ patient[0] }}">{{ patient[1] }}</option>
                        {% endfor %}
                    </select>
                    <a href="/register_patient" style="white-space: nowrap; color: #27ae60; text-decoration: none; font-weight: bold; border: 2px solid #27ae60; padding: 10px; border-radius: 6px;">＋ 新規追加</a>
                </div>
            </div>
        <p>
            <label>体温 (℃):</label><br>
            <input type="number" step="0.1" name="temperature" required>
        </p>
        <p>
            <label>血圧 (上):</label><br>
            <input type="number" name="blood_pressure_high" required>
        </p>
        <p>
            <label>血圧 (下):</label><br>
            <input type="number" name="blood_pressure_low" required>
        </p>
        <p>
            <label>脈拍:</label><br>
            <input type="number" name="pulse" required>
        </p>
        <p>
            <label>特記事項（メモ）:</label><br>
            <textarea name="memo" rows="4" cols="40" placeholder="例：今日はお粥を少し残しました"></textarea>
        </p>
        <button type="submit">お医者さんにデータを送信</button>
    </form>
</body>
</html>
